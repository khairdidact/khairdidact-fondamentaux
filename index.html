<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Les 10 fondamentaux pédagogiques pour l'alphabétisation, le FLE et l'illettrisme — adultes en apprentissage du français. KHAIRDIDACT.">
<title>Les fondamentaux — KHAIRDIDACT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --sage: #3d6b4f;
    --navy: #1a1a2e;
    --accent: #c85a3a;
    --muted: #6b6b7a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--navy);
    line-height: 1.6;
  }

  .wrapper {
    max-width: 960px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 3rem;
  }

  header.page-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header.page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.25rem, 5vw, 3.5rem);
    color: var(--sage);
    margin: 0 0 0.5rem;
    line-height: 1.1;
  }

  header.page-header p.subtitle {
    font-size: clamp(1rem, 2.2vw, 1.25rem);
    font-style: italic;
    color: var(--navy);
    margin: 0 auto;
    max-width: 680px;
  }

  .divider {
    width: 80px;
    height: 3px;
    background: var(--accent);
    border: none;
    margin: 1.25rem auto 0;
  }

  .actions {
    display: flex;
    justify-content: center;
    margin: 1.5rem 0 2rem;
  }

  .btn-print {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--sage);
    color: #fff;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(26, 26, 46, 0.15);
  }

  .btn-print:hover {
    background: #2d523c;
  }

  .btn-print:active {
    transform: translateY(1px);
  }

  .btn-print svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  figure.infographie {
    margin: 0;
    padding: 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(26, 26, 46, 0.12);
    background: #fff;
  }

  figure.infographie img {
    display: block;
    width: 100%;
    height: auto;
  }

  figcaption {
    font-size: 0.875rem;
    color: var(--muted);
    text-align: center;
    margin-top: 1rem;
    font-style: italic;
  }

  @media (max-width: 600px) {
    .wrapper { padding: 1.5rem 1rem 2rem; }
  }

  /* ===== Impression ===== */
  @media print {
    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    html, body {
      background: #fff;
      color: #000;
    }

    .wrapper {
      max-width: none;
      padding: 0;
    }

    .actions,
    .btn-print {
      display: none !important;
    }

    header.page-header {
      margin-bottom: 0.5rem;
    }

    header.page-header h1 {
      font-size: 24pt;
      color: var(--sage);
    }

    header.page-header p.subtitle {
      font-size: 11pt;
    }

    .divider {
      margin: 0.5rem auto;
    }

    figure.infographie {
      box-shadow: none;
      border-radius: 0;
      page-break-inside: avoid;
    }

    figure.infographie img {
      max-height: 240mm;
      width: auto;
      max-width: 100%;
      margin: 0 auto;
    }

    figcaption {
      font-size: 9pt;
      margin-top: 0.25rem;
    }
  }
</style>
</head>
<body>

<div class="wrapper">

  <header class="page-header">
    <h1>Les fondamentaux</h1>
    <p class="subtitle">
      Pour l'alphabétisation, le FLE et l'illettrisme — adultes en apprentissage du français
    </p>
    <hr class="divider">
  </header>

  <div class="actions">
    <button type="button" class="btn-print" onclick="window.print()" aria-label="Imprimer l'affiche">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="6 9 6 2 18 2 18 9"></polyline>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
        <rect x="6" y="14" width="12" height="8"></rect>
      </svg>
      Imprimer l'affiche
    </button>
  </div>

  <figure class="infographie">
    <img
      src="fondamentaux-pedagogiques.jpg"
      alt="Infographie des 10 fondamentaux pédagogiques pour l'alphabétisation, le FLE et l'illettrisme : dignité inconditionnelle, utilité immédiate, empowerment, sécurité psychologique, reconnaissance des parcours migratoires et de vie, relation de confiance, apprentissage actif et contextualisé, lutte contre la honte et la stigmatisation, progressivité et valorisation des micro-réussites, accessibilité globale.">
    <figcaption>
      Une bonne pédagogie d'alphabétisation, ce n'est pas d'abord une méthode :
      c'est une éthique de la relation et de l'utilité.
    </figcaption>
  </figure>

</div>

</body>
</html>
